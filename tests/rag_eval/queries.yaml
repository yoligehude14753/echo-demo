# RAG 评估集 · EchoDesk hybrid retrieval ground-truth
# ---------------------------------------------------------------
# 50 个 query, 用于给 BM25 baseline 与未来 hybrid(bge-m3 + hnswlib + RRF)
# 做 A/B 对比. 标注规则:
#
# - expected_doc_ids: 人工依据 doc title + meeting summary 标注的 *真正相关* doc.
#   不是抄系统当前 top-30, 而是按"这个 query 的答案在哪几个 doc 里"判断.
# - 每个 query 标 3-8 个 doc_id (单一 doc 的事实查询除外, 可只标 1-2 个).
# - category 4 类:
#     technical_qa : 褐蚁产品事实查询 (定位、价格、配置、规格、BOM 等), 主要落 workspace PDFs.
#     summary      : 单一会议/单一主题总结性提问, 落具体 meeting doc.
#     cross_doc    : 涉及 2+ doc 综合 (型号差异、跨手册对照、跨会议主题).
#     time_range   : 按时间维度问"今天/本周/某日的对话/录音", 主要落 ambient + 当天 meetings.
# - difficulty:
#     easy   : 关键词足以命中, BM25 期望也能召回.
#     medium : 需要正确的多样性 + length normalization.
#     hard   : 跨 doc 综合或 ambient 长 doc 拆分敏感, BM25 baseline 易丢.
#
# 数据快照: 2026-05-28 backend /rag/docs 返回 30 docs, 8 workspace PDFs (褐蚁系列),
# 21 meetings(都在 2026-05-28), 1 ambient (ambient-20260528, 1367 chunks).

