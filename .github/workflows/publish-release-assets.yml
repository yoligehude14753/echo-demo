name: Publish validated release assets

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: Existing GitHub release tag
        required: true
        type: string
      release_sha:
        description: Exact 40-character release SHA authorized for every candidate
        required: true
        type: string
      source_run_id:
        description: Successful exact-SHA Actions run containing the candidate
        required: true
        type: string
      platform:
        description: Validated artifact family to publish
        required: true
        type: choice
        options:
          - macos
          - windows
          - android

concurrency:
  group: publish-release-${{ inputs.release_tag }}-${{ inputs.platform }}
  cancel-in-progress: false

permissions: {}

jobs:
  publish:
    name: ${{ inputs.platform }} / exact-SHA release upload
    if: github.actor == github.repository_owner
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: write
    steps:
      - name: authorize the source run and release tag
        id: authorize
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          PLATFORM: ${{ inputs.platform }}
          RELEASE_TAG: ${{ inputs.release_tag }}
          RELEASE_SHA: ${{ inputs.release_sha }}
          SOURCE_RUN_ID: ${{ inputs.source_run_id }}
        run: |
          set -euo pipefail
          [[ "$RELEASE_SHA" =~ ^[0-9a-f]{40}$ ]]
          [[ "$SOURCE_RUN_ID" =~ ^[0-9]+$ ]]

          # BEGIN RELEASE TAG ROUTING
          if [[ "$RELEASE_TAG" == "v0.3.3-preview.1" ]]; then
            echo "retired release tag is not publishable: ${RELEASE_TAG}" >&2
            exit 1
          fi
          case "$RELEASE_SHA" in
            28caaade04cdb2038c2950017cbf702f126252c1|8164bbee96d8ab5771d66e251a83c204af49471c)
              echo "retired release SHA is not publishable: ${RELEASE_SHA}" >&2
              exit 1
              ;;
          esac
          if [[ "$RELEASE_TAG" =~ ^v([0-9]+\.[0-9]+\.[0-9]+)$ ]]; then
            package_version="${BASH_REMATCH[1]}"
            release_channel="stable"
          elif [[ "$RELEASE_TAG" =~ ^v([0-9]+\.[0-9]+\.[0-9]+)-preview\.([0-9]+)$ ]]; then
            package_version="${BASH_REMATCH[1]}"
            release_channel="preview"
          else
            echo "unsupported release tag: ${RELEASE_TAG}" >&2
            exit 1
          fi
          # END RELEASE TAG ROUTING

          case "$PLATFORM" in
            macos)
              artifact="echodesk-macos-signed-candidate-${RELEASE_SHA}"
              expected_job="macOS signed candidate"
              expected_workflow_path=".github/workflows/build-desktop-release-candidates.yml"
              ;;
            windows)
              artifact="echodesk-windows-signed-candidate-${RELEASE_SHA}"
              expected_job="Windows signed candidate"
              expected_workflow_path=".github/workflows/build-desktop-release-candidates.yml"
              ;;
            android)
              artifact="echodesk-android-tv-signed-release-candidate-${RELEASE_SHA}"
              expected_job="Android + TV / signed release candidate and historical upgrade"
              expected_workflow_path=".github/workflows/build-android-tv-release.yml"
              ;;
            *)
              printf 'unsupported platform: %s\n' "$PLATFORM" >&2
              exit 1
              ;;
          esac

          read -r run_status run_conclusion run_event run_branch run_sha run_path < <(
            gh api "repos/${GITHUB_REPOSITORY}/actions/runs/${SOURCE_RUN_ID}" \
              --jq '[.status,.conclusion,.event,.head_branch,.head_sha,.path] | @tsv'
          )
          test "$run_status" = "completed"
          test "$run_conclusion" = "success"
          test "$run_event" = "workflow_dispatch"
          test "$run_branch" = "main"
          test "$run_sha" = "$RELEASE_SHA"
          test "$run_path" = "$expected_workflow_path"

          jobs_payload="$(gh api \
            "repos/${GITHUB_REPOSITORY}/actions/runs/${SOURCE_RUN_ID}/jobs?filter=latest&per_page=100")"
          jq -e \
            --arg expected_job "$expected_job" \
            'any(.jobs[]; .name == $expected_job and .status == "completed" and .conclusion == "success")' \
            <<<"${jobs_payload}" >/dev/null

          tag_type="$(
            gh api "repos/${GITHUB_REPOSITORY}/git/ref/tags/${RELEASE_TAG}" --jq .object.type
          )"
          tag_sha="$(
            gh api "repos/${GITHUB_REPOSITORY}/git/ref/tags/${RELEASE_TAG}" --jq .object.sha
          )"
          if [ "$tag_type" = "tag" ]; then
            tag_sha="$(
              gh api "repos/${GITHUB_REPOSITORY}/git/tags/${tag_sha}" --jq .object.sha
            )"
          fi
          test "$tag_sha" = "$RELEASE_SHA"
          release_is_prerelease="$(
            gh release view "$RELEASE_TAG" \
              --repo "$GITHUB_REPOSITORY" \
              --json isPrerelease \
              --jq .isPrerelease
          )"
          if [ "$release_channel" = "preview" ]; then
            test "$release_is_prerelease" = "true"
          else
            test "$release_is_prerelease" = "false"
          fi

          printf 'artifact=%s\n' "$artifact" >> "$GITHUB_OUTPUT"
          printf 'release_sha=%s\n' "$RELEASE_SHA" >> "$GITHUB_OUTPUT"
          printf 'package_version=%s\n' "$package_version" >> "$GITHUB_OUTPUT"
          printf 'release_channel=%s\n' "$release_channel" >> "$GITHUB_OUTPUT"

      - name: download the already-validated candidate
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: ${{ steps.authorize.outputs.artifact }}
          path: candidate
          repository: ${{ github.repository }}
          run-id: ${{ inputs.source_run_id }}
          github-token: ${{ github.token }}

      - name: verify candidate allowlist and checksums
        shell: bash
        env:
          PLATFORM: ${{ inputs.platform }}
          RELEASE_TAG: ${{ inputs.release_tag }}
          RELEASE_SHA: ${{ inputs.release_sha }}
          PACKAGE_VERSION: ${{ steps.authorize.outputs.package_version }}
        run: |
          set -euo pipefail
          version="$PACKAGE_VERSION"
          test -n "$version"
          case "$PLATFORM" in
            macos)
              expected=(
                "EchoDesk-${version}-arm64.dmg"
                "EchoDesk-${version}-arm64.dmg.blockmap"
                "EchoDesk-${version}-arm64-mac.zip"
                "EchoDesk-${version}-arm64-mac.zip.blockmap"
                latest-mac.yml
                SHA256SUMS-macOS.txt
                "EchoDesk-SBOM.cdx.json"
              )
              checksum="SHA256SUMS-macOS.txt"
              ;;
            windows)
              expected=(
                "EchoDesk.Setup.${version}.exe"
                "EchoDesk.Setup.${version}.exe.blockmap"
                "EchoDesk-${version}-win-x64.zip"
                latest.yml
                SHA256SUMS-Windows.txt
                "EchoDesk-SBOM.cdx.json"
              )
              checksum="SHA256SUMS-Windows.txt"
              ;;
            android)
              expected=(
                "EchoDesk-${version}-android.apk"
                "EchoDesk-${version}-android-tv.apk"
                "EchoDesk-${version}-android-signing.json"
                "EchoDesk-${version}-android-signing-lineage.bin"
                "EchoDesk-${version}-smart-tv.apk"
                "EchoDesk-${version}-smart-tv-oneclick.zip"
                "EchoDesk-${version}-android-upgrade-smoke.json"
                "EchoDesk-${version}-android-tv-upgrade-smoke.json"
                "EchoDesk-${version}-Android-SBOM.cdx.json"
                "SHA256SUMS-Android.txt"
              )
              checksum="SHA256SUMS-Android.txt"
              ;;
            *)
              echo "unsupported platform: ${PLATFORM}" >&2
              exit 1
              ;;
          esac
          mapfile -t actual < <(
            find candidate -maxdepth 1 -type f -printf '%f\n' | LC_ALL=C sort
          )
          diff -u \
            <(printf '%s\n' "${expected[@]}" | LC_ALL=C sort) \
            <(printf '%s\n' "${actual[@]}")
          (cd candidate && sha256sum --check --strict "$checksum")

      - name: publish assets to the existing GitHub release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ inputs.release_tag }}
        run: |
          set -euo pipefail
          gh release upload "$RELEASE_TAG" candidate/* \
            --repo "$GITHUB_REPOSITORY" \
            --clobber
