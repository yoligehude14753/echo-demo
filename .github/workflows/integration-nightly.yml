name: integration-nightly

# 每天 UTC 03:00（北京时间 11:00）跑一次真 LLM/STT/TTS E2E。
# 也支持手动 workflow_dispatch 触发，方便 PR 后立刻验证。
#
# 为什么独立于 ci.yml：
# - 这些测试调真上游（yunwu MiniMax-M2.7 + heyi-bj firered/qwen3_tts），单跑 10-20 min；
#   塞进 PR ci.yml 会让每个 PR 都付钱+拖时长。
# - 失败时通过邮件/PR comment 提示，不阻塞 PR 合入（pytest -m integration 是 advisory）。
# - 用 GitHub Secrets 注入 key，避免 hardcode。

on:
  schedule:
    # 每天 UTC 03:00 跑一次（北京 11:00，办公时段早段可立刻看到）
    - cron: "0 3 * * *"
  workflow_dispatch:
    inputs:
      mark:
        description: "pytest -m 表达式（默认 integration）"
        required: false
        default: "integration"

# 同一时刻只允许一个 nightly 跑，避免并发对上游打满
concurrency:
  group: integration-nightly
  cancel-in-progress: false

jobs:
  skill-real-llm:
    name: skill / real LLM E2E (yunwu MiniMax-M2.7)
    runs-on: ubuntu-latest
    # 单次最长 30 分钟：7 个 skill 用例 × 平均 2-3 min + 上游偶发慢
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: install backend runtime deps（与 ci.yml 持平 + skill 执行依赖）
        run: |
          python -m pip install --upgrade pip
          pip install \
            fastapi==0.115.0 uvicorn==0.30.6 httpx==0.27.2 \
            pydantic==2.9.2 pydantic-settings==2.5.2 \
            python-multipart==0.0.12 openai==1.51.0 \
            httpx-sse==0.4.0 tenacity==9.0.0 \
            numpy==2.1.1 jieba==0.42.1 rank-bm25==0.2.2 \
            aiosqlite==0.20.0 \
            pytest==8.3.3 pytest-asyncio==0.24.0 pytest-timeout==2.3.1 \
            python-docx==1.1.2 openpyxl==3.1.5 fpdf2==2.7.9
      - name: install ppt_ib_deck node deps (phase4-doc-skills)
        working-directory: backend/app/adapters/skill/assets/ppt_ib_deck
        run: npm install --silent --no-audit --no-fund
      - name: run real-LLM skill E2E
        timeout-minutes: 25
        working-directory: backend
        env:
          YUNWU_OPEN_KEY: ${{ secrets.YUNWU_OPEN_KEY }}
        run: |
          if [[ -z "$YUNWU_OPEN_KEY" ]]; then
            echo "::warning::YUNWU_OPEN_KEY secret 未配置 → 全部 skip"
            exit 0
          fi
          pytest tests/integration/test_skill_e2e_yunwu.py \
            -v --tb=short --durations=10 \
            -m integration

  rag-and-web-real:
    name: rag+web / real Tavily + LLM
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: install backend runtime deps
        run: |
          python -m pip install --upgrade pip
          pip install \
            fastapi==0.115.0 httpx==0.27.2 \
            pydantic==2.9.2 pydantic-settings==2.5.2 \
            openai==1.51.0 httpx-sse==0.4.0 tenacity==9.0.0 \
            numpy==2.1.1 jieba==0.42.1 rank-bm25==0.2.2 \
            aiosqlite==0.20.0 \
            pytest==8.3.3 pytest-asyncio==0.24.0 pytest-timeout==2.3.1
      - name: run rag+web E2E
        timeout-minutes: 10
        working-directory: backend
        env:
          YUNWU_OPEN_KEY: ${{ secrets.YUNWU_OPEN_KEY }}
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
        run: |
          if [[ -z "$YUNWU_OPEN_KEY" ]]; then
            echo "::warning::YUNWU_OPEN_KEY secret 未配置 → 跳过"
            exit 0
          fi
          pytest tests/integration/test_rag_and_web.py \
            tests/integration/test_intent_router_e2e.py \
            tests/integration/test_embedding_yunwu_real.py \
            -v --tb=short --durations=10 \
            -m integration

  notify-on-failure:
    name: notify on failure
    runs-on: ubuntu-latest
    needs: [skill-real-llm, rag-and-web-real]
    if: failure()
    steps:
      - name: comment summary in step output
        run: |
          {
            echo "## nightly integration 失败"
            echo ""
            echo "- skill-real-llm: ${{ needs.skill-real-llm.result }}"
            echo "- rag-and-web-real: ${{ needs.rag-and-web-real.result }}"
            echo ""
            echo "上游 key/服务 状态 / 流式 idle timeout / docs-skill output invariants 任一变化都可能导致 fail。"
            echo "见对应 job 的 pytest --tb 输出定位。"
          } >> $GITHUB_STEP_SUMMARY
