name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

# 取消旧 run（同 PR push 多次时）
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: detect-changes
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      desktop: ${{ steps.filter.outputs.desktop }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'backend/**'
              - 'pyproject.toml'
              - '.github/workflows/**'
            desktop:
              - 'desktop/**'
              - '.github/workflows/**'

  backend-lint:
    name: backend / lint
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: install dev deps
        run: |
          python -m pip install --upgrade pip
          pip install ruff==0.15.14
      - run: ruff check backend
      - run: ruff format --check backend

  backend-typecheck:
    name: backend / typecheck
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: install deps（mypy 需要导入 app/* 全部模块的类型，因此需 adapter 用到的 SDK）
        run: |
          python -m pip install --upgrade pip
          pip install \
            mypy==1.11.2 \
            pydantic==2.9.2 \
            pydantic-settings==2.5.2 \
            fastapi==0.115.0 \
            httpx==0.27.2 \
            python-multipart==0.0.12 \
            openai==1.51.0 \
            tenacity==9.0.0 \
            numpy==2.1.1 \
            jieba==0.42.1 \
            rank-bm25==0.2.2
      - run: mypy backend/app

  backend-test:
    name: backend / test (unit + arch)
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: install deps（最小子集：unit + arch 不需要 torch/funasr/speechbrain）
        run: |
          python -m pip install --upgrade pip
          pip install \
            fastapi==0.115.0 \
            uvicorn==0.30.6 \
            httpx==0.27.2 \
            pydantic==2.9.2 \
            pydantic-settings==2.5.2 \
            python-multipart==0.0.12 \
            openai==1.51.0 \
            httpx-sse==0.4.0 \
            tenacity==9.0.0 \
            numpy==2.1.1 \
            jieba==0.42.1 \
            rank-bm25==0.2.2 \
            pytest==8.3.3 \
            pytest-asyncio==0.24.0 \
            pytest-cov==5.0.0
      - name: unit + arch tests
        working-directory: backend
        run: |
          pytest tests/unit tests/arch -v --cov=app --cov-report=term-missing -m "unit or arch"

  check:
    # 唯一 Required Status Check：上游必须真跑通才算 pass
    # detect-changes 必须 success（不允许 failed/cancelled）
    # backend-* 允许 skipped（无 backend 改动时），但只要跑了就必须 success
    name: check
    needs: [changes, backend-lint, backend-typecheck, backend-test]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: gate
        run: |
          set -e
          if [[ "${{ needs.changes.result }}" != "success" ]]; then
            echo "detect-changes 必须 success（实际:${{ needs.changes.result }}）"
            exit 1
          fi
          [[ "${{ needs.backend-lint.result }}" =~ ^(success|skipped)$ ]] || { echo "lint failed"; exit 1; }
          [[ "${{ needs.backend-typecheck.result }}" =~ ^(success|skipped)$ ]] || { echo "typecheck failed"; exit 1; }
          [[ "${{ needs.backend-test.result }}" =~ ^(success|skipped)$ ]] || { echo "test failed"; exit 1; }
          # 触发了 backend 变更但所有 backend job 都 skipped → 漏跑
          if [[ "${{ needs.changes.outputs.backend }}" == "true" && \
                "${{ needs.backend-lint.result }}" == "skipped" && \
                "${{ needs.backend-typecheck.result }}" == "skipped" && \
                "${{ needs.backend-test.result }}" == "skipped" ]]; then
            echo "backend 有变更但 lint/typecheck/test 全 skipped → 漏跑"
            exit 1
          fi
          echo "all checks ok"
