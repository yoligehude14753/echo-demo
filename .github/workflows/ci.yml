name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

# 取消旧 run（同 PR push 多次时）
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-lint:
    name: backend / lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.11"
          cache: pip
      - name: install dev deps
        run: pip install --require-hashes -r backend/requirements-lint.lock
      - run: ruff check backend
      - run: ruff format --check backend

  backend-typecheck:
    name: backend / typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.11"
          cache: pip
      - name: install deps（mypy 需要导入 app/* 全部模块的类型，因此需 adapter 用到的 SDK）
        run: pip install --require-hashes -r backend/requirements-typecheck.lock
      - run: mypy backend/app

  backend-dependency-audit:
    name: supply chain / dependency audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "24"
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.11"
          cache: pip
      - name: require official npm lock registries
        run: |
          node scripts/check-npm-lock-registries.cjs
          python scripts/check-ci-action-pins.py
          python scripts/check-python-locks.py
      - name: audit published backend dependencies
        run: |
          pip install --require-hashes -r backend/requirements-audit.lock
          # CVE-2025-3000 has no compatible fixed torch/torchaudio pair yet.
          # It is explicitly mitigated by disabling TorchScript before import;
          # the backend test gate verifies that process-boundary invariant.
          grep -F "CVE-2025-3000" backend/SECURITY_DEPENDENCY_EXCEPTIONS.md
          grep -Fx "torch==2.11.0             # CPU 版即可（ECAPA 声纹用；与 torchaudio 同版本）" backend/requirements.txt
          python - <<'PY'
          from datetime import date
          from pathlib import Path
          import re

          text = Path("backend/SECURITY_DEPENDENCY_EXCEPTIONS.md").read_text(encoding="utf-8")
          match = re.search(r"Exception expires: (\d{4}-\d{2}-\d{2})", text)
          if match is None:
              raise SystemExit("CVE exception must declare an expiry date")
          expiry = date.fromisoformat(match.group(1))
          if date.today() > expiry:
              raise SystemExit(f"CVE exception expired on {expiry.isoformat()}")
          PY
          pip-audit -r backend/requirements.lock --ignore-vuln CVE-2025-3000

  backend-test:
    name: backend / deterministic full gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.11"
          cache: pip
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "24"
      - name: install full backend test dependencies
        run: pip install --require-hashes -r backend/requirements-dev.lock
      - name: install deterministic Node skill runtime
        working-directory: backend/app/adapters/skill/assets/ppt_ib_deck
        run: npm ci
      - name: audit packaged Node skill runtime
        working-directory: backend/app/adapters/skill/assets/ppt_ib_deck
        run: npm audit --omit=dev --audit-level=high --registry=https://registry.npmjs.org
      - name: deterministic backend suite (live contracts excluded, zero skip)
        timeout-minutes: 20
        working-directory: backend
        run: |
          # Reuse the lockfile-installed deck runtime for the real pptxgenjs
          # contract.  Without these flags the test deliberately skips under
          # CI, which contradicts this job's zero-skip invariant.
          export ECHO_RUN_NODE_INSTALL=1
          export ECHODESK_NODE_RUNTIME="$(command -v node)"
          export ECHODESK_NODE_RUNTIME_IS_ELECTRON=true
          pytest tests -m "not live" \
            --junitxml=pytest-deterministic.xml \
            --cov=app --cov-report=term-missing \
            --timeout=60 --timeout-method=thread --durations=20
          python - <<'PY'
          import xml.etree.ElementTree as ET
          root = ET.parse("pytest-deterministic.xml").getroot()
          skipped = sum(int(node.attrib.get("skipped", "0")) for node in root.iter("testsuite"))
          if skipped:
              raise SystemExit(f"deterministic gate must have zero skips; got {skipped}")
          PY

  desktop-e2e:
    name: desktop / static + build + e2e + scenarios
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: desktop/package-lock.json
      - name: install deps
        working-directory: desktop
        run: npm ci
      - name: run Electron main-process contracts
        working-directory: desktop
        run: npm run test:electron
      - name: check version sync
        working-directory: desktop
        run: npm run version:check
      - name: lint + typecheck + build
        working-directory: desktop
        run: |
          npm run lint
          npm run typecheck
          npm run build
      - name: production dependency audit
        working-directory: desktop
        run: npm audit --audit-level=high --registry=https://registry.npmjs.org
      - name: install playwright browsers
        working-directory: desktop
        run: npx playwright install --with-deps chromium
      - name: run e2e
        working-directory: desktop
        env:
          CI: "1"
          NODE_ENV: test
        run: npm run e2e
      - name: run scenario suite
        working-directory: desktop
        env:
          CI: "1"
          NODE_ENV: test
        run: npm run scenarios

  android-tv:
    name: Android + TV / development build + identity instrumentation
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: desktop/package-lock.json
      - uses: actions/setup-java@c5195efecf7bdfc987ee8bae7a71cb8b11521c00 # v4.7.1
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle
      - uses: android-actions/setup-android@9fc6c4e9069bf8d3d10b2204b1fb8f6ef7065407 # v3.2.2
      - name: install pinned Android SDK components
        run: |
          sdkmanager "platform-tools" "platforms;android-36" "build-tools;36.1.0" \
            "emulator" "system-images;android-35;google_apis;x86_64"
      - name: install desktop dependencies
        working-directory: desktop
        run: npm ci
      - name: build explicit development Android and TV APKs
        working-directory: desktop
        run: npm run app:build:android:development
      - name: run Android JVM identity tests and lint
        working-directory: desktop/android
        run: ./gradlew testDebugUnitTest lintDebug -PechoApplicationId=com.echodesk.app
      - name: prove unsigned/debug public release fails closed
        working-directory: desktop/android
        run: |
          if ./gradlew assembleRelease -PechoApplicationId=com.echodesk.app; then
            echo "assembleRelease unexpectedly accepted missing stable signing inputs" >&2
            exit 1
          fi
      - name: run Android identity instrumentation on emulator
        uses: reactivecircus/android-emulator-runner@1dcd0090116d15e7c562f8db72807de5e036a4ed # v2.34.0
        with:
          api-level: 35
          arch: x86_64
          target: google_apis
          profile: pixel_2
          disable-animations: true
          script: cd desktop/android && ./gradlew :app:connectedDebugAndroidTest -PechoApplicationId=com.echodesk.app
      - name: verify development artifacts cannot masquerade as releases
        shell: bash
        run: |
          version="$(node -p "require('./desktop/package.json').version")"
          test -f "desktop/release/EchoDesk-${version}-android-development.apk"
          test -f "desktop/release/EchoDesk-${version}-android-tv-development.apk"
          test ! -e "desktop/release/EchoDesk-${version}-android.apk"
          test ! -e "desktop/release/EchoDesk-${version}-android-tv.apk"
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: echodesk-android-tv-development
          path: desktop/release/*-development.apk
          if-no-files-found: error
          retention-days: 7

  desktop-packaged-smoke:
    name: desktop / arm64 bundled-backend read-only DMG smoke
    runs-on: macos-latest
    permissions:
      contents: read
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: |
            desktop/package-lock.json
            backend/app/adapters/skill/assets/ppt_ib_deck/package-lock.json
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.11"
          cache: pip
      - name: verify arm64 runner and install desktop/backend build runtime
        run: |
          test "$(uname -m)" = "arm64" || {
            echo "macOS packaged gate requires an arm64 runner" >&2
            exit 1
          }
          npm ci --prefix desktop
          pip install --require-hashes -r backend/packaging/requirements-build.lock
          npm ci --prefix backend/app/adapters/skill/assets/ppt_ib_deck
          python -c 'import platform, PyInstaller; assert platform.machine() == "arm64"; print(PyInstaller.__version__)'
      - name: build arm64 backend first, then development ad-hoc DMG and zip (never publish)
        working-directory: desktop
        run: ECHODESK_BACKEND_PYTHON="$(command -v python)" npm run app:dist:mac:adhoc-test
      - name: verify bundled backend and release artifacts
        run: |
          version="$(node -p "require('./desktop/package.json').version")"
          backend="desktop/release/mac-arm64/EchoDesk.app/Contents/Resources/backend/echodesk-backend"
          test -x backend/dist/echodesk-backend
          test -x "$backend"
          file backend/dist/echodesk-backend | grep -F "arm64"
          file "$backend" | grep -F "arm64"
          codesign --verify --deep --strict --verbose=2 desktop/release/mac-arm64/EchoDesk.app
          test -f "desktop/release/EchoDesk-${version}-arm64.dmg"
          test -f "desktop/release/EchoDesk-${version}-arm64-mac.zip"
      - name: mounted read-only DMG + actual bundled backend smoke
        working-directory: desktop
        run: npm run smoke:mac:dmg
      - name: generate macOS checksums and CycloneDX SBOM
        run: |
          cd desktop/release
          version="$(node -p "require('../package.json').version")"
          shasum -a 256 "EchoDesk-${version}-arm64.dmg" "EchoDesk-${version}-arm64-mac.zip" > SHA256SUMS-macOS.txt
          cd ../..
          python scripts/generate-release-sbom.py desktop/release/EchoDesk-SBOM.cdx.json
      - name: attest macOS build provenance
        if: ${{ github.event_name != 'pull_request' }}
        uses: actions/attest-build-provenance@e8998f949152b193b063cb0ec769d69d929409be # v2.4.0
        with:
          subject-path: |
            desktop/release/EchoDesk-*-arm64.dmg
            desktop/release/EchoDesk-*-arm64-mac.zip
            desktop/release/SHA256SUMS-macOS.txt
            desktop/release/EchoDesk-SBOM.cdx.json
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: echodesk-macos-arm64-adhoc-test
          path: |
            desktop/release/EchoDesk-*-arm64.dmg
            desktop/release/EchoDesk-*-arm64-mac.zip
            desktop/release/SHA256SUMS-macOS.txt
            desktop/release/EchoDesk-SBOM.cdx.json
          if-no-files-found: error
          retention-days: 14

  desktop-linux-packaged-smoke:
    name: desktop / Linux x64 self-contained AppImage + deb smoke
    runs-on: ubuntu-22.04
    timeout-minutes: 45
    permissions:
      contents: read
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: |
            desktop/package-lock.json
            backend/app/adapters/skill/assets/ppt_ib_deck/package-lock.json
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.11"
          cache: pip
      - name: install clean Linux build and smoke dependencies
        run: |
          test "$(uname -m)" = "x86_64"
          npm ci --prefix desktop
          npm ci --prefix backend/app/adapters/skill/assets/ppt_ib_deck
          pip install --require-hashes -r backend/packaging/requirements-build.lock
          cd desktop
          npx playwright install-deps chromium
      - name: run Electron main-process contracts
        working-directory: desktop
        run: npm run test:electron
      - name: verify release version
        working-directory: desktop
        run: npm run version:check
      - name: build x64 backend, AppImage and deb
        working-directory: desktop
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
        run: ECHODESK_BACKEND_PYTHON="$(command -v python)" npm run app:dist:linux
      - name: verify Linux release contents
        shell: bash
        run: |
          set -euo pipefail
          version="$(node -p "require('./desktop/package.json').version")"
          backend="desktop/release/linux-unpacked/resources/backend/echodesk-backend"
          appimage="desktop/release/EchoDesk-${version}-linux-x64.AppImage"
          deb="desktop/release/EchoDesk-${version}-linux-x64.deb"
          test -x backend/dist/echodesk-backend
          test -x "$backend"
          file backend/dist/echodesk-backend | grep -E "ELF 64-bit.*x86-64"
          file "$backend" | grep -E "ELF 64-bit.*x86-64"
          test -x desktop/release/linux-unpacked/echodesk
          test -x "$appimage"
          test -f "$deb"
          test -f desktop/release/latest-linux.yml
          grep -F "version: ${version}" desktop/release/latest-linux.yml >/dev/null
          dpkg-deb --info "$deb" >/dev/null
          dpkg-deb --contents "$deb" | grep -F "resources/backend/echodesk-backend" >/dev/null
          extract_dir="$(mktemp -d)"
          trap 'rm -rf "$extract_dir"' EXIT
          appimage_abs="$(realpath "$appimage")"
          (cd "$extract_dir" && "$appimage_abs" --appimage-extract >/dev/null)
          extracted_backend="$(find "$extract_dir/squashfs-root" \
            -path '*/resources/backend/echodesk-backend' -type f -perm /111 \
            -print -quit)"
          test -n "$extracted_backend"
      - name: unpacked Electron + bundled backend + artifact + persistence smoke
        working-directory: desktop
        run: npm run smoke:linux
      - name: guard Linux public build contents
        shell: bash
        run: |
          found="$(find desktop/dist backend/dist desktop/release \
            \( -name '*.map' -o -name '.env' -o -name '*.pem' -o -name '*.key' \) \
            ! -path '*/certifi/cacert.pem' \
            -print 2>/dev/null || true)"
          if [ -n "$found" ]; then
            echo "Forbidden files found in Linux public build:" >&2
            echo "$found" >&2
            exit 1
          fi
      - name: generate Linux checksums
        shell: bash
        run: |
          set -euo pipefail
          cd desktop/release
          version="$(node -p "require('../package.json').version")"
          files=(
            "EchoDesk-${version}-linux-x64.AppImage"
            "EchoDesk-${version}-linux-x64.deb"
            latest-linux.yml
          )
          for file in "${files[@]}"; do test -f "$file"; done
          sha256sum "${files[@]}" > SHA256SUMS-Linux.txt
          cd ../..
          python scripts/generate-release-sbom.py desktop/release/EchoDesk-SBOM.cdx.json
      - name: attest Linux build provenance
        if: ${{ github.event_name != 'pull_request' }}
        uses: actions/attest-build-provenance@e8998f949152b193b063cb0ec769d69d929409be # v2.4.0
        with:
          subject-path: |
            desktop/release/EchoDesk-*-linux-x64.AppImage
            desktop/release/EchoDesk-*-linux-x64.deb
            desktop/release/SHA256SUMS-Linux.txt
            desktop/release/EchoDesk-SBOM.cdx.json
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: echodesk-linux-x64-release
          path: |
            desktop/release/EchoDesk-*-linux-x64.AppImage
            desktop/release/EchoDesk-*-linux-x64.deb
            desktop/release/latest-linux.yml
            desktop/release/SHA256SUMS-Linux.txt
            desktop/release/EchoDesk-SBOM.cdx.json
          if-no-files-found: error
          retention-days: 14

  desktop-windows-packaged-smoke:
    name: desktop / Windows x64 installed NSIS smoke
    uses: ./.github/workflows/build-windows-installer.yml
    with:
      publish_release: false
    permissions:
      contents: read
      id-token: write
      attestations: write

  check:
    # 唯一 Required Status Check：所有确定性门禁在每个 PR/push 上必须真正运行并通过。
    name: check
    needs: [backend-lint, backend-typecheck, backend-dependency-audit, backend-test, desktop-e2e, android-tv, desktop-packaged-smoke, desktop-linux-packaged-smoke, desktop-windows-packaged-smoke]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: gate
        run: |
          set -e
          [[ "${{ needs.backend-lint.result }}" == "success" ]] || { echo "lint did not pass"; exit 1; }
          [[ "${{ needs.backend-typecheck.result }}" == "success" ]] || { echo "typecheck did not pass"; exit 1; }
          [[ "${{ needs.backend-dependency-audit.result }}" == "success" ]] || { echo "dependency audit did not pass"; exit 1; }
          [[ "${{ needs.backend-test.result }}" == "success" ]] || { echo "backend tests did not pass"; exit 1; }
          [[ "${{ needs.desktop-e2e.result }}" == "success" ]] || { echo "desktop tests did not pass"; exit 1; }
          [[ "${{ needs.android-tv.result }}" == "success" ]] || { echo "Android/TV gate did not pass"; exit 1; }
          [[ "${{ needs.desktop-packaged-smoke.result }}" == "success" ]] || { echo "packaged smoke did not pass"; exit 1; }
          [[ "${{ needs.desktop-linux-packaged-smoke.result }}" == "success" ]] || { echo "Linux packaged smoke did not pass"; exit 1; }
          [[ "${{ needs.desktop-windows-packaged-smoke.result }}" == "success" ]] || { echo "Windows packaged smoke did not pass"; exit 1; }
          echo "all checks ok"
