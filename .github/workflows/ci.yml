name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# 取消旧 run（同 PR push 多次时）
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: detect-changes
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      desktop: ${{ steps.filter.outputs.desktop }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'backend/**'
              - 'pyproject.toml'
              - '.github/workflows/**'
            desktop:
              - 'desktop/**'
              - '.github/workflows/**'

  backend-lint:
    name: backend / lint
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: install dev deps
        run: |
          python -m pip install --upgrade pip
          pip install ruff==0.6.9
      - run: ruff check backend
      - run: ruff format --check backend

  backend-typecheck:
    name: backend / typecheck
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: install deps
        run: |
          python -m pip install --upgrade pip
          pip install mypy==1.11.2 pydantic==2.9.2 pydantic-settings==2.5.2 fastapi==0.115.0
      - run: mypy backend/app

  backend-test:
    name: backend / test (unit + arch)
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: install deps（最小子集：unit + arch 不需要 torch/funasr）
        run: |
          python -m pip install --upgrade pip
          pip install \
            fastapi==0.115.0 \
            uvicorn==0.30.6 \
            httpx==0.27.2 \
            pydantic==2.9.2 \
            pydantic-settings==2.5.2 \
            pytest==8.3.3 \
            pytest-asyncio==0.24.0 \
            pytest-cov==5.0.0
      - name: unit + arch tests
        working-directory: backend
        run: |
          pytest tests/unit tests/arch -v --cov=app --cov-report=term-missing -m "unit or arch"

  check:
    # 唯一 Required Status Check：所有上游 job 通过才算 pass
    name: check
    needs: [backend-lint, backend-typecheck, backend-test]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: gate
        run: |
          set -e
          [[ "${{ needs.backend-lint.result }}" =~ ^(success|skipped)$ ]] || { echo "lint failed"; exit 1; }
          [[ "${{ needs.backend-typecheck.result }}" =~ ^(success|skipped)$ ]] || { echo "typecheck failed"; exit 1; }
          [[ "${{ needs.backend-test.result }}" =~ ^(success|skipped)$ ]] || { echo "test failed"; exit 1; }
          echo "all checks ok"
