name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

# 取消旧 run（同 PR push 多次时）
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-lint:
    name: backend / lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.11"
          cache: pip
      - name: install dev deps
        run: pip install --require-hashes -r backend/requirements-lint.lock
      - run: ruff check backend
      - run: ruff format --check backend

  backend-typecheck:
    name: backend / typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.11"
          cache: pip
      - name: install deps（mypy 需要导入 app/* 全部模块的类型，因此需 adapter 用到的 SDK）
        run: pip install --require-hashes -r backend/requirements-typecheck.lock
      - run: mypy backend/app

  backend-dependency-audit:
    name: supply chain / dependency audit (${{ matrix.label }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: linux-x64-py311
            os: ubuntu-latest
            expected_system: Linux
            expected_machine: x86_64
          - label: macos-arm64-py311
            os: macos-latest
            expected_system: Darwin
            expected_machine: arm64
          - label: windows-x64-py311
            os: windows-latest
            expected_system: Windows
            expected_machine: AMD64
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24"
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.11"
          cache: pip
      - name: require official npm lock registries
        run: |
          node scripts/check-npm-lock-registries.cjs
          python scripts/check-ci-action-pins.py
          python scripts/check-python-locks.py
      - name: install locked Python audit tool
        run: pip install --require-hashes -r backend/requirements-audit.lock
      - name: capture and validate raw Python dependency audit evidence
        shell: bash
        env:
          EXPECTED_AUDIT_SYSTEM: ${{ matrix.expected_system }}
          EXPECTED_AUDIT_MACHINE: ${{ matrix.expected_machine }}
        run: |
          set -euo pipefail
          evidence="$RUNNER_TEMP/echodesk-python-audit"
          mkdir -p "$evidence"
          python - <<'PY' > "$evidence/environment.json"
          import json
          import os
          import platform

          observed = {
              "system": platform.system(),
              "machine": platform.machine(),
              "python": platform.python_version(),
          }
          expected = {
              "system": os.environ["EXPECTED_AUDIT_SYSTEM"],
              "machine": os.environ["EXPECTED_AUDIT_MACHINE"],
          }
          if observed["system"] != expected["system"] or observed["machine"] != expected["machine"]:
              raise SystemExit(f"dependency audit runner mismatch: expected={expected}, observed={observed}")
          print(json.dumps({"expected": expected, "observed": observed}, sort_keys=True))
          PY

          audit_lock() {
            local label="$1"
            local lock="$2"
            local report="$evidence/${label}.json"
            local exit_file="$evidence/${label}.exit-code"
            local audit_input="$evidence/${label}.requirements-audit.lock"
            local audit_exit
            python scripts/check-pip-audit-evidence.py normalize-lock \
              --lock "$lock" \
              --output "$audit_input"
            set +e
            pip-audit \
              --requirement "$audit_input" \
              --no-deps \
              --disable-pip \
              --strict \
              --format json \
              --aliases on \
              --desc off \
              --progress-spinner off \
              --output "$report"
            audit_exit=$?
            set -e
            printf '%s\n' "$audit_exit" > "$exit_file"
            test -s "$report" || {
              echo "pip-audit did not produce raw JSON for $lock (exit=$audit_exit)" >&2
              exit 1
            }
          }

          audit_lock runtime backend/requirements.lock
          audit_lock dev backend/requirements-dev.lock
          audit_lock lint backend/requirements-lint.lock
          audit_lock typecheck backend/requirements-typecheck.lock
          audit_lock audit-tool backend/requirements-audit.lock
          audit_lock build backend/packaging/requirements-build.lock

          for label_lock in \
            "runtime:backend/requirements.lock" \
            "dev:backend/requirements-dev.lock" \
            "build:backend/packaging/requirements-build.lock"; do
            label="${label_lock%%:*}"
            lock="${label_lock#*:}"
            python scripts/check-pip-audit-evidence.py exception \
              --report "$evidence/${label}.json" \
              --exit-code "$evidence/${label}.exit-code" \
              --lock "$lock" \
              --exception backend/SECURITY_DEPENDENCY_EXCEPTIONS.md \
              --package torch \
              --vulnerability CVE-2025-3000
          done

          for label in lint typecheck audit-tool; do
            python scripts/check-pip-audit-evidence.py clean \
              --report "$evidence/${label}.json" \
              --exit-code "$evidence/${label}.exit-code"
          done
      - name: upload raw Python dependency audit evidence
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: echodesk-python-audit-raw-${{ matrix.label }}
          path: ${{ runner.temp }}/echodesk-python-audit
          if-no-files-found: error
          retention-days: 14

  backend-test:
    name: backend / deterministic full gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.11"
          cache: pip
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24"
      - name: install full backend test dependencies
        run: pip install --require-hashes -r backend/requirements-dev.lock
      - name: install deterministic Node skill runtime
        working-directory: backend/app/adapters/skill/assets/ppt_ib_deck
        run: npm ci
      - name: audit packaged Node skill runtime
        working-directory: backend/app/adapters/skill/assets/ppt_ib_deck
        run: npm audit --omit=dev --audit-level=high --registry=https://registry.npmjs.org
      - name: deterministic backend suite (live contracts excluded, zero skip)
        timeout-minutes: 20
        working-directory: backend
        run: |
          # Reuse the lockfile-installed deck runtime for the real pptxgenjs
          # contract.  Without these flags the test deliberately skips under
          # CI, which contradicts this job's zero-skip invariant.
          export ECHO_RUN_NODE_INSTALL=1
          export ECHODESK_NODE_RUNTIME="$(command -v node)"
          export ECHODESK_NODE_RUNTIME_IS_ELECTRON=true
          export ECHO_USER_DIR="$RUNNER_TEMP/echodesk-deterministic"
          export DB_PATH="$ECHO_USER_DIR/echodesk.db"
          export STORAGE_DIR="$ECHO_USER_DIR/storage"
          export RAG_INDEX_DIR="$ECHO_USER_DIR/rag_index"
          export WORKSPACE_STATE_FILE="$ECHO_USER_DIR/workspace_state.json"
          export SKILL_EXECUTOR_BUILD_DIR="$ECHO_USER_DIR/skill_build"
          pytest tests -m "not live" \
            --junitxml=pytest-deterministic.xml \
            --cov=app --cov-report=term-missing \
            --timeout=60 --timeout-method=thread --durations=20
          python - <<'PY'
          import xml.etree.ElementTree as ET
          root = ET.parse("pytest-deterministic.xml").getroot()
          skipped = sum(int(node.attrib.get("skipped", "0")) for node in root.iter("testsuite"))
          if skipped:
              raise SystemExit(f"deterministic gate must have zero skips; got {skipped}")
          PY

  desktop-e2e:
    name: desktop / static + build + e2e + scenarios
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: desktop/package-lock.json
      - name: install deps
        working-directory: desktop
        run: npm ci
      - name: run Electron main-process contracts
        working-directory: desktop
        run: npm run test:electron
      - name: check version sync
        working-directory: desktop
        run: npm run version:check
      - name: lint + typecheck + build
        working-directory: desktop
        run: |
          npm run lint
          npm run typecheck
          npm run build
      - name: production dependency audit
        working-directory: desktop
        run: npm audit --audit-level=high --registry=https://registry.npmjs.org
      - name: install playwright browsers
        working-directory: desktop
        run: npx playwright install --with-deps chromium
      - name: run e2e
        working-directory: desktop
        env:
          CI: "1"
          NODE_ENV: test
        run: npm run e2e
      - name: run scenario suite
        working-directory: desktop
        env:
          CI: "1"
          NODE_ENV: test
        run: npm run scenarios

  android-tv:
    name: Android + TV / development build + identity instrumentation
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: desktop/package-lock.json
      - uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a # v5.5.0
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle
      - uses: android-actions/setup-android@40fd30fb8d7440372e1316f5d1809ec01dcd3699 # v4.0.1
      - name: enable and verify KVM for Android instrumentation
        shell: bash
        run: |
          set -euo pipefail
          if [[ ! -c /dev/kvm ]]; then
            echo "GitHub hosted runner does not expose the required /dev/kvm device" >&2
            exit 1
          fi
          if [[ ! -r /dev/kvm || ! -w /dev/kvm ]]; then
            sudo chmod a+rw /dev/kvm
          fi
          test -c /dev/kvm
          test -r /dev/kvm
          test -w /dev/kvm
      - name: install pinned Android SDK components
        run: |
          sdkmanager "platform-tools" "platforms;android-36" "build-tools;36.1.0" \
            "emulator" "system-images;android-35;google_apis;x86_64"
      - name: install desktop dependencies
        working-directory: desktop
        run: npm ci
      - name: build explicit development Android and TV APKs
        working-directory: desktop
        run: npm run app:build:android:development
      - name: run Android JVM identity tests and lint
        working-directory: desktop/android
        run: ./gradlew testDebugUnitTest lintDebug -PechoApplicationId=com.echodesk.app
      - name: prove unsigned/debug public release fails closed
        working-directory: desktop/android
        run: |
          if ./gradlew assembleRelease -PechoApplicationId=com.echodesk.app; then
            echo "assembleRelease unexpectedly accepted missing stable signing inputs" >&2
            exit 1
          fi
      - name: run Android identity instrumentation on emulator
        uses: reactivecircus/android-emulator-runner@a421e43855164a8197daf9d8d40fe71c6996bb0d # v2.38.0
        with:
          api-level: 35
          arch: x86_64
          target: google_apis
          profile: pixel_2
          disable-animations: true
          disable-linux-hw-accel: false
          script: cd desktop/android && ./gradlew :app:connectedDebugAndroidTest -PechoApplicationId=com.echodesk.app
      - name: verify development artifacts cannot masquerade as releases
        shell: bash
        run: |
          version="$(node -p "require('./desktop/package.json').version")"
          test -f "desktop/release/EchoDesk-${version}-android-development.apk"
          test -f "desktop/release/EchoDesk-${version}-android-tv-development.apk"
          test ! -e "desktop/release/EchoDesk-${version}-android.apk"
          test ! -e "desktop/release/EchoDesk-${version}-android-tv.apk"
          mapfile -t candidates < <(
            find desktop/release -maxdepth 1 -type f \
              -name 'EchoDesk-*-development.apk' -printf '%f\n' | LC_ALL=C sort
          )
          expected=(
            "EchoDesk-${version}-android-development.apk"
            "EchoDesk-${version}-android-tv-development.apk"
          )
          diff -u \
            <(printf '%s\n' "${expected[@]}" | LC_ALL=C sort) \
            <(printf '%s\n' "${candidates[@]}")
          printf 'ECHODESK_VERSION=%s\n' "${version}" >> "${GITHUB_ENV}"
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: echodesk-android-tv-development
          path: |
            desktop/release/EchoDesk-${{ env.ECHODESK_VERSION }}-android-development.apk
            desktop/release/EchoDesk-${{ env.ECHODESK_VERSION }}-android-tv-development.apk
          if-no-files-found: error
          retention-days: 7

  desktop-packaged-smoke:
    name: desktop / arm64 bundled-backend read-only DMG smoke
    runs-on: macos-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: |
            desktop/package-lock.json
            backend/app/adapters/skill/assets/ppt_ib_deck/package-lock.json
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.11"
          cache: pip
      - name: verify arm64 runner and install desktop/backend build runtime
        run: |
          test "$(uname -m)" = "arm64" || {
            echo "macOS packaged gate requires an arm64 runner" >&2
            exit 1
          }
          npm ci --prefix desktop
          pip install --require-hashes -r backend/packaging/requirements-build.lock
          npm ci --prefix backend/app/adapters/skill/assets/ppt_ib_deck
          python -c 'import platform, PyInstaller; assert platform.machine() == "arm64"; print(PyInstaller.__version__)'
      - name: build arm64 backend first, then development ad-hoc DMG and zip (never publish)
        working-directory: desktop
        run: ECHODESK_BACKEND_PYTHON="$(command -v python)" npm run app:dist:mac:adhoc-test
      - name: verify bundled backend and release artifacts
        run: |
          version="$(node -p "require('./desktop/package.json').version")"
          backend="desktop/release/mac-arm64/EchoDesk.app/Contents/Resources/backend/echodesk-backend"
          test -x backend/dist/echodesk-backend
          test -x "$backend"
          file backend/dist/echodesk-backend | grep -F "arm64"
          file "$backend" | grep -F "arm64"
          codesign --verify --deep --strict --verbose=2 desktop/release/mac-arm64/EchoDesk.app
          test -f "desktop/release/EchoDesk-${version}-arm64.dmg"
          test -f "desktop/release/EchoDesk-${version}-arm64-mac.zip"
          node desktop/scripts/verify-release-update-metadata.cjs mac
      - name: mounted read-only DMG + actual bundled backend smoke
        working-directory: desktop
        run: npm run smoke:mac:dmg
      - name: generate macOS checksums and CycloneDX SBOM
        run: |
          python scripts/generate-release-sbom.py desktop/release/EchoDesk-SBOM.cdx.json
          cd desktop/release
          version="$(node -p "require('../package.json').version")"
          shasum -a 256 \
            "EchoDesk-${version}-arm64.dmg" \
            "EchoDesk-${version}-arm64-mac.zip" \
            EchoDesk-SBOM.cdx.json > SHA256SUMS-macOS.txt
          shasum -a 256 -c SHA256SUMS-macOS.txt
          expected=(
            "EchoDesk-${version}-arm64.dmg"
            "EchoDesk-${version}-arm64-mac.zip"
          )
          candidates=()
          for file in EchoDesk-*-arm64.dmg EchoDesk-*-arm64-mac.zip; do
            test -f "${file}" && candidates+=("${file}")
          done
          diff -u \
            <(printf '%s\n' "${expected[@]}" | LC_ALL=C sort) \
            <(printf '%s\n' "${candidates[@]}" | LC_ALL=C sort)
          printf 'ECHODESK_VERSION=%s\n' "${version}" >> "${GITHUB_ENV}"
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: echodesk-macos-arm64-adhoc-test
          path: |
            desktop/release/EchoDesk-${{ env.ECHODESK_VERSION }}-arm64.dmg
            desktop/release/EchoDesk-${{ env.ECHODESK_VERSION }}-arm64-mac.zip
            desktop/release/SHA256SUMS-macOS.txt
            desktop/release/EchoDesk-SBOM.cdx.json
          if-no-files-found: error
          retention-days: 14

  desktop-linux-packaged-smoke:
    name: desktop / Linux x64 self-contained AppImage + deb smoke
    runs-on: ubuntu-22.04
    timeout-minutes: 75
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: |
            desktop/package-lock.json
            backend/app/adapters/skill/assets/ppt_ib_deck/package-lock.json
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.11"
          cache: pip
      - name: validate CPU-only Python locks before dependency installation
        run: python scripts/check-python-locks.py
      - name: install clean Linux CPU build dependencies
        run: |
          set -euo pipefail
          test "$(uname -m)" = "x86_64"
          python -m pip install --require-hashes -r backend/packaging/requirements-build.lock
      - name: verify installed Linux CPU-only runtime before packaging
        run: |
          python - <<'PY'
          from importlib import metadata

          import torch
          import torchaudio

          expected = "2.11.0+cpu"
          assert metadata.version("torch") == expected, metadata.version("torch")
          assert metadata.version("torchaudio") == expected, metadata.version("torchaudio")
          assert torch.__version__ == expected, torch.__version__
          assert torchaudio.__version__ == expected, torchaudio.__version__
          assert torch.version.cuda is None, torch.version.cuda
          assert torch.cuda.is_available() is False

          installed = {
              distribution.metadata["Name"].lower().replace("_", "-")
              for distribution in metadata.distributions()
              if distribution.metadata["Name"]
          }
          forbidden = sorted(
              name
              for name in installed
              if name == "triton" or name.startswith(("cuda-", "nvidia-"))
          )
          assert not forbidden, f"accelerator packages installed: {forbidden}"
          PY
      - name: install clean Linux frontend and smoke dependencies
        run: |
          set -euo pipefail
          npm ci --prefix desktop
          npm ci --prefix backend/app/adapters/skill/assets/ppt_ib_deck
          cd desktop
          npx playwright install-deps chromium
      - name: run Electron main-process contracts
        working-directory: desktop
        run: npm run test:electron
      - name: verify release version
        working-directory: desktop
        run: npm run version:check
      - name: build x64 backend, AppImage and deb
        working-directory: desktop
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
        run: ECHODESK_BACKEND_PYTHON="$(command -v python)" npm run app:dist:linux
      - name: verify Linux release contents
        shell: bash
        run: |
          set -euo pipefail
          version="$(node -p "require('./desktop/package.json').version")"
          backend="desktop/release/linux-unpacked/resources/backend/echodesk-backend"
          appimage="desktop/release/EchoDesk-${version}-linux-x86_64.AppImage"
          deb="desktop/release/EchoDesk-${version}-linux-amd64.deb"
          test -x backend/dist/echodesk-backend
          test -x "$backend"
          file backend/dist/echodesk-backend | grep -E "ELF 64-bit.*x86-64"
          file "$backend" | grep -E "ELF 64-bit.*x86-64"
          test -x desktop/release/linux-unpacked/echodesk
          test -x "$appimage"
          test -f "$deb"
          test -f desktop/release/latest-linux.yml
          grep -F "version: ${version}" desktop/release/latest-linux.yml >/dev/null
          node desktop/scripts/verify-release-update-metadata.cjs linux
          dpkg-deb --info "$deb" >/dev/null
          dpkg-deb --contents "$deb" | grep -F "resources/backend/echodesk-backend" >/dev/null
          extract_dir="$(mktemp -d)"
          trap 'rm -rf "$extract_dir"' EXIT
          appimage_abs="$(realpath "$appimage")"
          (cd "$extract_dir" && "$appimage_abs" --appimage-extract >/dev/null)
          extracted_backend="$(find "$extract_dir/squashfs-root" \
            -path '*/resources/backend/echodesk-backend' -type f -perm /111 \
            -print -quit)"
          test -n "$extracted_backend"
      - name: unpacked Electron + bundled backend + artifact + persistence smoke
        working-directory: desktop
        run: npm run smoke:linux
      - name: extracted AppImage + bundled backend + artifact + persistence smoke
        shell: bash
        run: |
          set -euo pipefail
          version="$(node -p "require('./desktop/package.json').version")"
          appimage="$GITHUB_WORKSPACE/desktop/release/EchoDesk-${version}-linux-x86_64.AppImage"
          extract_root="$RUNNER_TEMP/echodesk-appimage-${version}"
          rm -rf "$extract_root"
          mkdir -p "$extract_root"
          (cd "$extract_root" && "$appimage" --appimage-extract >/dev/null)
          app="$extract_root/squashfs-root/echodesk"
          backend="$extract_root/squashfs-root/resources/backend/echodesk-backend"
          test -x "$app"
          test -x "$backend"
          ECHODESK_APP_BIN="$app" \
          ECHODESK_EXPECTED_BACKEND_BIN="$backend" \
          ECHODESK_SMOKE_PORT=18770 \
          ECHODESK_SMOKE_ROOT="$RUNNER_TEMP/echodesk-appimage-smoke" \
            npm --prefix desktop run smoke:linux
      - name: installed deb + bundled backend + artifact + persistence smoke
        shell: bash
        run: |
          set -euo pipefail
          version="$(node -p "require('./desktop/package.json').version")"
          deb="$GITHUB_WORKSPACE/desktop/release/EchoDesk-${version}-linux-amd64.deb"
          package="$(dpkg-deb -f "$deb" Package)"
          cleanup() {
            sudo dpkg --purge "$package" >/dev/null 2>&1 || true
          }
          trap cleanup EXIT
          sudo apt-get install -y "$deb"
          app="$(dpkg -L "$package" | grep -E '/echodesk$' | head -n 1)"
          backend="$(dpkg -L "$package" | grep -E '/resources/backend/echodesk-backend$' | head -n 1)"
          test -x "$app"
          test -x "$backend"
          ECHODESK_APP_BIN="$app" \
          ECHODESK_EXPECTED_BACKEND_BIN="$backend" \
          ECHODESK_SMOKE_PORT=18771 \
          ECHODESK_SMOKE_ROOT="$RUNNER_TEMP/echodesk-deb-smoke" \
            npm --prefix desktop run smoke:linux
      - name: guard Linux public build contents
        shell: bash
        run: |
          set -euo pipefail
          scan_roots=(desktop/dist backend/dist desktop/release)
          for scan_root in "${scan_roots[@]}"; do
            test -d "${scan_root}" || {
              echo "public build scan root is missing: ${scan_root}" >&2
              exit 1
            }
          done
          found="$(find "${scan_roots[@]}" \
            \( -name '*.map' -o -name '.env' -o -name '*.pem' -o -name '*.key' \) \
            ! -path '*/certifi/cacert.pem' \
            -print)"
          if [ -n "$found" ]; then
            echo "Forbidden files found in Linux public build:" >&2
            echo "$found" >&2
            exit 1
          fi
      - name: generate Linux checksums
        shell: bash
        run: |
          set -euo pipefail
          python scripts/generate-release-sbom.py desktop/release/EchoDesk-SBOM.cdx.json
          cd desktop/release
          version="$(node -p "require('../package.json').version")"
          files=(
            "EchoDesk-${version}-linux-x86_64.AppImage"
            "EchoDesk-${version}-linux-amd64.deb"
            latest-linux.yml
            EchoDesk-SBOM.cdx.json
          )
          for file in "${files[@]}"; do test -f "$file"; done
          sha256sum "${files[@]}" > SHA256SUMS-Linux.txt
          sha256sum --check --strict SHA256SUMS-Linux.txt
          expected=("${files[@]}" "SHA256SUMS-Linux.txt")
          mapfile -t candidates < <(
            find . -maxdepth 1 -type f \
              \( -name 'EchoDesk-*-linux-x86_64.AppImage' \
                 -o -name 'EchoDesk-*-linux-amd64.deb' \
                 -o -name 'latest-linux.yml' \
                 -o -name 'EchoDesk-SBOM.cdx.json' \
                 -o -name 'SHA256SUMS-Linux.txt' \) \
              -printf '%f\n' | LC_ALL=C sort
          )
          diff -u \
            <(printf '%s\n' "${expected[@]}" | LC_ALL=C sort) \
            <(printf '%s\n' "${candidates[@]}")
          printf 'ECHODESK_VERSION=%s\n' "${version}" >> "${GITHUB_ENV}"
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: echodesk-linux-x64-release
          path: |
            desktop/release/EchoDesk-${{ env.ECHODESK_VERSION }}-linux-x86_64.AppImage
            desktop/release/EchoDesk-${{ env.ECHODESK_VERSION }}-linux-amd64.deb
            desktop/release/latest-linux.yml
            desktop/release/SHA256SUMS-Linux.txt
            desktop/release/EchoDesk-SBOM.cdx.json
          if-no-files-found: error
          retention-days: 14
          compression-level: 0

  desktop-linux-provenance:
    name: desktop / Linux exact-main provenance
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: desktop-linux-packaged-smoke
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      attestations: write
    steps:
      - name: download the already-validated Linux candidate
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: echodesk-linux-x64-release
          path: candidate
      - name: verify the downloaded Linux candidate allowlist
        shell: bash
        run: |
          set -euo pipefail
          mapfile -t appimages < <(
            find candidate -maxdepth 1 -type f \
              -name 'EchoDesk-*-linux-x86_64.AppImage' -printf '%f\n'
          )
          test "${#appimages[@]}" -eq 1
          [[ "${appimages[0]}" =~ ^EchoDesk-(.+)-linux-x86_64\.AppImage$ ]]
          version="${BASH_REMATCH[1]}"
          expected=(
            "EchoDesk-${version}-linux-x86_64.AppImage"
            "EchoDesk-${version}-linux-amd64.deb"
            latest-linux.yml
            SHA256SUMS-Linux.txt
            EchoDesk-SBOM.cdx.json
          )
          mapfile -t actual < <(
            find candidate -maxdepth 1 -type f -printf '%f\n' | LC_ALL=C sort
          )
          diff -u \
            <(printf '%s\n' "${expected[@]}" | LC_ALL=C sort) \
            <(printf '%s\n' "${actual[@]}")
          (cd candidate && sha256sum --check --strict SHA256SUMS-Linux.txt)
          printf 'ECHODESK_VERSION=%s\n' "${version}" >> "${GITHUB_ENV}"
      - name: attest the exact-main Linux candidate
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-path: |
            candidate/EchoDesk-${{ env.ECHODESK_VERSION }}-linux-x86_64.AppImage
            candidate/EchoDesk-${{ env.ECHODESK_VERSION }}-linux-amd64.deb
            candidate/latest-linux.yml
            candidate/SHA256SUMS-Linux.txt
            candidate/EchoDesk-SBOM.cdx.json

  desktop-windows-packaged-smoke:
    name: desktop / Windows x64 installed NSIS smoke
    uses: ./.github/workflows/build-windows-installer.yml
    with:
      publish_release: false
    permissions:
      contents: read

  check:
    # 唯一 Required Status Check：所有确定性门禁在每个 PR/push 上必须真正运行并通过。
    name: check
    needs: [backend-lint, backend-typecheck, backend-dependency-audit, backend-test, desktop-e2e, android-tv, desktop-packaged-smoke, desktop-linux-packaged-smoke, desktop-windows-packaged-smoke]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: gate
        run: |
          set -e
          [[ "${{ needs.backend-lint.result }}" == "success" ]] || { echo "lint did not pass"; exit 1; }
          [[ "${{ needs.backend-typecheck.result }}" == "success" ]] || { echo "typecheck did not pass"; exit 1; }
          [[ "${{ needs.backend-dependency-audit.result }}" == "success" ]] || { echo "dependency audit did not pass"; exit 1; }
          [[ "${{ needs.backend-test.result }}" == "success" ]] || { echo "backend tests did not pass"; exit 1; }
          [[ "${{ needs.desktop-e2e.result }}" == "success" ]] || { echo "desktop tests did not pass"; exit 1; }
          [[ "${{ needs.android-tv.result }}" == "success" ]] || { echo "Android/TV gate did not pass"; exit 1; }
          [[ "${{ needs.desktop-packaged-smoke.result }}" == "success" ]] || { echo "packaged smoke did not pass"; exit 1; }
          [[ "${{ needs.desktop-linux-packaged-smoke.result }}" == "success" ]] || { echo "Linux packaged smoke did not pass"; exit 1; }
          [[ "${{ needs.desktop-windows-packaged-smoke.result }}" == "success" ]] || { echo "Windows packaged smoke did not pass"; exit 1; }
          echo "all checks ok"
