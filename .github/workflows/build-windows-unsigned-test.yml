name: Build Windows unsigned test package

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: Existing prerelease tag (must be v0.3.2)
        required: true
        type: string
      release_sha:
        description: Exact green main SHA to build
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: windows-unsigned-test-${{ inputs.release_tag }}
  cancel-in-progress: false

jobs:
  build-and-upload:
    name: Windows x64 unsigned-test NSIS + portable ZIP
    if: github.actor == github.repository_owner
    runs-on: windows-latest
    timeout-minutes: 90
    steps:
      - name: Checkout exact green main SHA
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          ref: ${{ inputs.release_sha }}
          fetch-depth: 0
          persist-credentials: false

      - name: Authorize exact main SHA and existing prerelease
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ inputs.release_tag }}
          RELEASE_SHA: ${{ inputs.release_sha }}
        run: |
          set -euo pipefail
          test "${GITHUB_REPOSITORY}" = "yoligehude14753/echo-demo"
          test "${GITHUB_REF}" = "refs/heads/${GITHUB_REF_NAME}"
          test "${RELEASE_TAG}" = "v0.3.2"
          test "${RELEASE_SHA}" = "7d59dba51e790bd54fcab38166039274fa5d2fd0"
          test "$(git rev-parse HEAD)" = "${RELEASE_SHA}"
          test "$(gh api "repos/${GITHUB_REPOSITORY}/git/ref/tags/${RELEASE_TAG}" --jq '.object.sha')" = "${RELEASE_SHA}"
          gh release view "${RELEASE_TAG}" --repo "${GITHUB_REPOSITORY}" --json isPrerelease --jq '.isPrerelease' | grep -Fx true

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1
        with:
          python-version: "3.11"

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: |
            desktop/package-lock.json
            backend/app/adapters/skill/assets/ppt_ib_deck/package-lock.json

      - name: Install locked build dependencies
        shell: bash
        run: |
          set -euo pipefail
          python -m venv backend/.venv
          backend/.venv/Scripts/python -m pip install --require-hashes -r backend/packaging/requirements-build.lock
          npm ci --prefix backend/app/adapters/skill/assets/ppt_ib_deck
          npm ci --prefix desktop

      - name: Run release contracts
        shell: bash
        run: |
          set -euo pipefail
          npm --prefix desktop run test:electron
          npm --prefix desktop run version:check

      - name: Build unsigned Windows test package
        working-directory: desktop
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
        run: npm run app:dist:win:unsigned-test

      - name: Verify and label untrusted test assets
        shell: bash
        env:
          RELEASE_TAG: ${{ inputs.release_tag }}
          RELEASE_SHA: ${{ inputs.release_sha }}
        run: |
          set -euo pipefail
          version="$(node -p "require('./desktop/package.json').version")"
          test "${version}" = "${RELEASE_TAG#v}"
          test -s "desktop/release/EchoDesk.Setup.${version}.exe"
          test -s "desktop/release/EchoDesk-${version}-win-x64.zip"
          test -s "desktop/release/latest.yml"
          mkdir -p upload
          cp "desktop/release/EchoDesk.Setup.${version}.exe" "upload/EchoDesk-${version}-Windows-x64-UNSIGNED-TEST-NSIS.exe"
          cp "desktop/release/EchoDesk-${version}-win-x64.zip" "upload/EchoDesk-${version}-Windows-x64-UNSIGNED-TEST-PORTABLE.zip"
          cat > upload/UNTRUSTED-WINDOWS-TEST-MANIFEST.txt <<EOF
          EchoDesk ${version} Windows x64 test package
          STATUS: UNSIGNED-TEST / UNTRUSTED
          This package is not Authenticode-signed and is not a trusted formal release.
          Source SHA: ${RELEASE_SHA}
          Source run: 29268547929 (green main CI)
          Release tag: ${RELEASE_TAG}
          EOF
          (cd upload && sha256sum * > SHA256SUMS-Windows-UNSIGNED-TEST.txt)
          sha256sum --check upload/SHA256SUMS-Windows-UNSIGNED-TEST.txt

      - name: Upload clearly marked assets to existing prerelease
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ inputs.release_tag }}
        run: gh release upload "${RELEASE_TAG}" upload/* --repo "${GITHUB_REPOSITORY}" --clobber
