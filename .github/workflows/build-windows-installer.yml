name: Build Windows Installer

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build backend binary
        working-directory: backend
        shell: bash
        run: |
          python -m venv .venv
          PY=.venv/Scripts/python
          "$PY" -m pip install --upgrade pip
          "$PY" -m pip install -r requirements.txt
          "$PY" -m pip install -r packaging/requirements-build.txt
          "$PY" -m PyInstaller --noconfirm packaging/echodesk-backend.spec

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: desktop/package-lock.json

      - name: Install desktop dependencies
        working-directory: desktop
        run: npm ci

      - name: Build Windows installer
        working-directory: desktop
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
        run: npm run app:dist:win

      - name: Guard public build contents
        shell: bash
        run: |
          found="$(find desktop/dist backend/dist desktop/release \
            \( -name '*.map' -o -name '.env' -o -name '*.pem' -o -name '*.key' \) \
            ! -path '*/certifi/cacert.pem' \
            -print 2>/dev/null || true)"
          if [ -n "$found" ]; then
            echo "Forbidden files found in public build:" >&2
            echo "$found" >&2
            exit 1
          fi

      - name: Generate checksums
        shell: bash
        run: |
          cd desktop/release
          shopt -s nullglob
          files=(*.exe)
          if [ "${#files[@]}" -eq 0 ]; then
            echo "No Windows installer files found" >&2
            exit 1
          fi
          sha256sum "${files[@]}" > SHA256SUMS-Windows.txt

      - uses: actions/upload-artifact@v4
        with:
          name: echodesk-windows-installer
          path: |
            desktop/release/*.exe
            desktop/release/SHA256SUMS-Windows.txt
          if-no-files-found: error

      - name: Upload to public release
        env:
          GH_TOKEN: ${{ secrets.PUBLIC_RELEASE_TOKEN }}
        shell: bash
        run: |
          if [ -z "$GH_TOKEN" ]; then
            echo "Missing PUBLIC_RELEASE_TOKEN secret" >&2
            exit 1
          fi
          gh release upload v0.2.0 \
            desktop/release/*.exe \
            desktop/release/SHA256SUMS-Windows.txt \
            --repo yoligehude14753/echodesk-public \
            --clobber

