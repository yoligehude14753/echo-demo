name: Migrate Android release secrets

on:
  workflow_dispatch:
    inputs:
      phase:
        description: "copy keeps repository sources; cleanup requires two successful run proofs"
        required: true
        type: choice
        options:
          - copy
          - cleanup
      release_sha:
        description: "Exact 40-character SHA at the tip of main authorizing migration"
        required: true
        type: string
      copy_run_id:
        description: "Successful copy-phase run id; required only for cleanup"
        required: false
        default: ""
        type: string
      validated_run_id:
        description: "Successful formal Android signing run id after copy; required only for cleanup"
        required: false
        default: ""
        type: string

permissions:
  contents: read

concurrency:
  group: migrate-android-release-secrets
  cancel-in-progress: false

jobs:
  authorize:
    name: authorize exact main migration phase
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: validate repository, source SHA, and phase inputs
        shell: bash
        env:
          RELEASE_SHA: ${{ inputs.release_sha }}
          PHASE: ${{ inputs.phase }}
          COPY_RUN_ID: ${{ inputs.copy_run_id }}
          VALIDATED_RUN_ID: ${{ inputs.validated_run_id }}
        run: |
          set -euo pipefail
          test "${GITHUB_REPOSITORY}" = "yoligehude14753/echo-demo" || {
            echo "secret migration is restricted to the canonical repository" >&2
            exit 1
          }
          test "${GITHUB_REF}" = "refs/heads/main" || {
            echo "secret migration must be dispatched from main" >&2
            exit 1
          }
          [[ "${RELEASE_SHA}" =~ ^[0-9a-f]{40}$ ]] || {
            echo "release_sha must be an exact lowercase 40-character commit SHA" >&2
            exit 1
          }
          test "${RELEASE_SHA}" = "${GITHUB_SHA}" || {
            echo "release_sha is not the exact main commit that dispatched this run" >&2
            exit 1
          }
          case "${PHASE}" in
            copy)
              test -z "${COPY_RUN_ID}" && test -z "${VALIDATED_RUN_ID}" || {
                echo "copy phase does not accept cleanup proof run ids" >&2
                exit 1
              }
              ;;
            cleanup)
              [[ "${COPY_RUN_ID}" =~ ^[1-9][0-9]*$ ]] || {
                echo "cleanup requires a numeric copy_run_id" >&2
                exit 1
              }
              [[ "${VALIDATED_RUN_ID}" =~ ^[1-9][0-9]*$ ]] || {
                echo "cleanup requires a numeric validated_run_id" >&2
                exit 1
              }
              ;;
            *)
              echo "unsupported migration phase" >&2
              exit 1
              ;;
          esac

  copy-secrets:
    name: copy signing secrets to protected target
    if: inputs.phase == 'copy'
    needs: authorize
    runs-on: ubuntu-latest
    environment: android-release-migration
    timeout-minutes: 10
    permissions:
      contents: read
    env:
      ADMIN_TOKEN: ${{ secrets.PUBLIC_RELEASE_TOKEN }}
      ECHODESK_ANDROID_LEGACY_KEYSTORE_BASE64: ${{ secrets.ECHODESK_ANDROID_LEGACY_KEYSTORE_BASE64 }}
      ECHODESK_ANDROID_LEGACY_KEY_ALIAS: ${{ secrets.ECHODESK_ANDROID_LEGACY_KEY_ALIAS }}
      ECHODESK_ANDROID_LEGACY_KEYSTORE_PASSWORD: ${{ secrets.ECHODESK_ANDROID_LEGACY_KEYSTORE_PASSWORD }}
      ECHODESK_ANDROID_LEGACY_KEY_PASSWORD: ${{ secrets.ECHODESK_ANDROID_LEGACY_KEY_PASSWORD }}
      ECHODESK_ANDROID_LEGACY_CERT_SHA256: ${{ secrets.ECHODESK_ANDROID_LEGACY_CERT_SHA256 }}
      ECHODESK_ANDROID_CURRENT_KEYSTORE_BASE64: ${{ secrets.ECHODESK_ANDROID_CURRENT_KEYSTORE_BASE64 }}
      ECHODESK_ANDROID_CURRENT_KEY_ALIAS: ${{ secrets.ECHODESK_ANDROID_CURRENT_KEY_ALIAS }}
      ECHODESK_ANDROID_CURRENT_KEYSTORE_PASSWORD: ${{ secrets.ECHODESK_ANDROID_CURRENT_KEYSTORE_PASSWORD }}
      ECHODESK_ANDROID_CURRENT_KEY_PASSWORD: ${{ secrets.ECHODESK_ANDROID_CURRENT_KEY_PASSWORD }}
      ECHODESK_ANDROID_CURRENT_CERT_SHA256: ${{ secrets.ECHODESK_ANDROID_CURRENT_CERT_SHA256 }}
    steps:
      - name: copy repository signing sources without deleting them
        shell: bash
        run: |
          set -euo pipefail
          required=(
            ECHODESK_ANDROID_LEGACY_KEYSTORE_BASE64
            ECHODESK_ANDROID_LEGACY_KEY_ALIAS
            ECHODESK_ANDROID_LEGACY_KEYSTORE_PASSWORD
            ECHODESK_ANDROID_LEGACY_KEY_PASSWORD
            ECHODESK_ANDROID_LEGACY_CERT_SHA256
            ECHODESK_ANDROID_CURRENT_KEYSTORE_BASE64
            ECHODESK_ANDROID_CURRENT_KEY_ALIAS
            ECHODESK_ANDROID_CURRENT_KEYSTORE_PASSWORD
            ECHODESK_ANDROID_CURRENT_KEY_PASSWORD
            ECHODESK_ANDROID_CURRENT_CERT_SHA256
          )

          test -n "${ADMIN_TOKEN:-}" || {
            echo "PUBLIC_RELEASE_TOKEN is unavailable in android-release-migration" >&2
            exit 1
          }

          migration_names="$(
            GH_TOKEN="${ADMIN_TOKEN}" gh api \
              "repos/${GITHUB_REPOSITORY}/environments/android-release-migration/secrets" \
              --paginate --jq '.secrets[].name' | sort
          )"
          repository_names="$(
            GH_TOKEN="${ADMIN_TOKEN}" gh secret list \
              --repo "${GITHUB_REPOSITORY}" --json name --jq '.[].name'
          )"
          if grep -Fxq PUBLIC_RELEASE_TOKEN <<<"${repository_names}"; then
            echo "PUBLIC_RELEASE_TOKEN must exist only in android-release-migration" >&2
            exit 1
          fi
          for name in "${required[@]}"; do
            if grep -Fxq "${name}" <<<"${migration_names}"; then
              echo "migration environment must not shadow repository signing source: ${name}" >&2
              exit 1
            fi
            grep -Fxq "${name}" <<<"${repository_names}" || {
              echo "repository signing source is unavailable: ${name}" >&2
              exit 1
            }
            test -n "${!name:-}" || {
              echo "required signing secret is unavailable: ${name}" >&2
              exit 1
            }
          done

          for name in "${required[@]}"; do
            printf '%s' "${!name}" |
              GH_TOKEN="${ADMIN_TOKEN}" gh secret set "${name}" \
                --env android-release --repo "${GITHUB_REPOSITORY}"
          done

          target_names="$(
            GH_TOKEN="${ADMIN_TOKEN}" gh api \
              "repos/${GITHUB_REPOSITORY}/environments/android-release/secrets" \
              --paginate --jq '.secrets[].name' | sort
          )"
          for name in "${required[@]}"; do
            grep -Fxq "${name}" <<<"${target_names}" || {
              echo "target environment secret verification failed: ${name}" >&2
              exit 1
            }
            grep -Fxq "${name}" <<<"${repository_names}" || {
              echo "copy phase unexpectedly lost repository source: ${name}" >&2
              exit 1
            }
          done

          echo "Copy phase complete. Repository sources remain intact."
          echo "Run the formal Android signing workflow, then dispatch cleanup with both proof run ids."

  cleanup-repository-secrets:
    name: cleanup repository signing secrets after proof
    if: inputs.phase == 'cleanup'
    needs: authorize
    runs-on: ubuntu-latest
    environment: android-release-migration
    timeout-minutes: 10
    permissions:
      actions: read
      contents: read
    env:
      ACTIONS_READ_TOKEN: ${{ github.token }}
      ADMIN_TOKEN: ${{ secrets.PUBLIC_RELEASE_TOKEN }}
      RELEASE_SHA: ${{ inputs.release_sha }}
      COPY_RUN_ID: ${{ inputs.copy_run_id }}
      VALIDATED_RUN_ID: ${{ inputs.validated_run_id }}
    steps:
      - name: prove copy and formal signing success before source cleanup
        shell: bash
        run: |
          set -euo pipefail
          required=(
            ECHODESK_ANDROID_LEGACY_KEYSTORE_BASE64
            ECHODESK_ANDROID_LEGACY_KEY_ALIAS
            ECHODESK_ANDROID_LEGACY_KEYSTORE_PASSWORD
            ECHODESK_ANDROID_LEGACY_KEY_PASSWORD
            ECHODESK_ANDROID_LEGACY_CERT_SHA256
            ECHODESK_ANDROID_CURRENT_KEYSTORE_BASE64
            ECHODESK_ANDROID_CURRENT_KEY_ALIAS
            ECHODESK_ANDROID_CURRENT_KEYSTORE_PASSWORD
            ECHODESK_ANDROID_CURRENT_KEY_PASSWORD
            ECHODESK_ANDROID_CURRENT_CERT_SHA256
          )

          test -n "${ADMIN_TOKEN:-}" || {
            echo "PUBLIC_RELEASE_TOKEN is unavailable in android-release-migration" >&2
            exit 1
          }

          copy_run="$(
            GH_TOKEN="${ACTIONS_READ_TOKEN}" gh api \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "repos/${GITHUB_REPOSITORY}/actions/runs/${COPY_RUN_ID}"
          )"
          jq -e \
            --arg repo "${GITHUB_REPOSITORY}" \
            --arg sha "${RELEASE_SHA}" '
              .repository.full_name == $repo
              and .head_sha == $sha
              and .head_branch == "main"
              and .event == "workflow_dispatch"
              and .status == "completed"
              and .conclusion == "success"
              and .path == ".github/workflows/migrate-android-release-secrets.yml"
            ' <<<"${copy_run}" >/dev/null || {
              echo "copy_run_id is not a successful exact-SHA copy workflow run" >&2
              exit 1
            }
          copy_finished_at="$(jq -r '.updated_at' <<<"${copy_run}")"
          copy_jobs="$(
            GH_TOKEN="${ACTIONS_READ_TOKEN}" gh api \
              "repos/${GITHUB_REPOSITORY}/actions/runs/${COPY_RUN_ID}/jobs?filter=latest&per_page=100"
          )"
          jq -e '
            any(
              .jobs[];
              .name == "copy signing secrets to protected target"
              and .status == "completed"
              and .conclusion == "success"
            )
          ' <<<"${copy_jobs}" >/dev/null || {
            echo "copy_run_id has no successful copy phase job" >&2
            exit 1
          }

          validated_run="$(
            GH_TOKEN="${ACTIONS_READ_TOKEN}" gh api \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "repos/${GITHUB_REPOSITORY}/actions/runs/${VALIDATED_RUN_ID}"
          )"
          jq -e \
            --arg repo "${GITHUB_REPOSITORY}" \
            --arg sha "${RELEASE_SHA}" '
              .repository.full_name == $repo
              and .head_sha == $sha
              and .head_branch == "main"
              and .event == "workflow_dispatch"
              and .status == "completed"
              and .conclusion == "success"
              and .path == ".github/workflows/build-android-tv-release.yml"
            ' <<<"${validated_run}" >/dev/null || {
              echo "validated_run_id is not a successful exact-SHA formal Android workflow run" >&2
              exit 1
            }
          validated_started_at="$(jq -r '.run_started_at' <<<"${validated_run}")"
          jq -e -n \
            --arg copied "${copy_finished_at}" \
            --arg validated "${validated_started_at}" \
            '($validated | fromdateiso8601) > ($copied | fromdateiso8601)' \
            >/dev/null || {
              echo "formal Android validation did not start after the copy phase completed" >&2
              exit 1
            }

          validated_jobs="$(
            GH_TOKEN="${ACTIONS_READ_TOKEN}" gh api \
              "repos/${GITHUB_REPOSITORY}/actions/runs/${VALIDATED_RUN_ID}/jobs?filter=latest&per_page=100"
          )"
          jq -e '
            any(
              .jobs[];
              .name == "Android + TV / signed release candidate and historical upgrade"
              and .status == "completed"
              and .conclusion == "success"
            )
          ' <<<"${validated_jobs}" >/dev/null || {
            echo "validated_run_id has no successful formal signing job" >&2
            exit 1
          }
          validated_artifacts="$(
            GH_TOKEN="${ACTIONS_READ_TOKEN}" gh api \
              "repos/${GITHUB_REPOSITORY}/actions/runs/${VALIDATED_RUN_ID}/artifacts?per_page=100"
          )"
          jq -e '
            any(
              .artifacts[];
              .name == "echodesk-android-tv-signed-release-candidate"
              and .expired == false
              and .size_in_bytes > 0
            )
          ' <<<"${validated_artifacts}" >/dev/null || {
            echo "validated_run_id has no retained signed candidate artifact" >&2
            exit 1
          }

          migration_names="$(
            GH_TOKEN="${ADMIN_TOKEN}" gh api \
              "repos/${GITHUB_REPOSITORY}/environments/android-release-migration/secrets" \
              --paginate --jq '.secrets[].name' | sort
          )"
          target_names="$(
            GH_TOKEN="${ADMIN_TOKEN}" gh api \
              "repos/${GITHUB_REPOSITORY}/environments/android-release/secrets" \
              --paginate --jq '.secrets[].name' | sort
          )"
          for name in "${required[@]}"; do
            if grep -Fxq "${name}" <<<"${migration_names}"; then
              echo "migration environment must not shadow signing source: ${name}" >&2
              exit 1
            fi
            grep -Fxq "${name}" <<<"${target_names}" || {
              echo "validated target environment no longer contains: ${name}" >&2
              exit 1
            }
          done

          repository_names="$(
            GH_TOKEN="${ADMIN_TOKEN}" gh secret list \
              --repo "${GITHUB_REPOSITORY}" --json name --jq '.[].name'
          )"
          for name in "${required[@]}"; do
            if grep -Fxq "${name}" <<<"${repository_names}"; then
              GH_TOKEN="${ADMIN_TOKEN}" gh secret delete "${name}" \
                --repo "${GITHUB_REPOSITORY}"
            fi
          done

          repository_names="$(
            GH_TOKEN="${ADMIN_TOKEN}" gh secret list \
              --repo "${GITHUB_REPOSITORY}" --json name --jq '.[].name'
          )"
          for name in "${required[@]}"; do
            if grep -Fxq "${name}" <<<"${repository_names}"; then
              echo "repository secret cleanup failed: ${name}" >&2
              exit 1
            fi
          done

          echo "Repository signing sources removed only after copy and formal signing proof."
          echo "Now delete PUBLIC_RELEASE_TOKEN from android-release-migration and revoke it at the issuer."
